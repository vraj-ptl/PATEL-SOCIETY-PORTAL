<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — Patel Society Portal</title>
    <meta name="description" content="Patel Community Society Management Portal - Login">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="login-wrapper">
        <div class="login-card">
            <div class="login-logo">
                <div class="login-logo-icon">🏛️</div>
                <h1>Patel Society Portal</h1>
                <p>Community Management System</p>
            </div>

            <div class="login-error" id="loginError"></div>

            <form class="login-form" id="loginForm">
                <div class="form-group">
                    <label class="form-label" for="username">Username</label>
                    <input class="form-input" type="text" id="username" name="username" placeholder="Enter your username" required autocomplete="username">
                </div>
                <div class="form-group">
                    <label class="form-label" for="password">Password</label>
                    <input class="form-input" type="password" id="password" name="password" placeholder="Enter your password" required autocomplete="current-password">
                </div>
                <button type="submit" class="btn btn-primary" id="loginBtn">
                    Sign In
                </button>
            </form>
        </div>
    </div>

    <script src="js/app.js"></script>
    <script>
        // Check if already logged in
        (async () => {
            try {
                const data = await API.get('/api/auth/me');
                if (data.user) {
                    window.location.href = data.user.role === 'admin' ? '/dashboard.html' : '/members.html';
                }
            } catch {}
        })();

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const errorEl = document.getElementById('loginError');
            const btn = document.getElementById('loginBtn');

            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;

            if (!username || !password) {
                errorEl.textContent = 'Please enter both username and password';
                errorEl.style.display = 'block';
                return;
            }

            btn.disabled = true;
            btn.innerHTML = '<span class="loading-spinner"></span> Signing in...';
            errorEl.style.display = 'none';

            try {
                const data = await API.post('/api/auth/login', { username, password });
                window.location.href = data.user.role === 'admin' ? '/dashboard.html' : '/members.html';
            } catch (err) {
                errorEl.textContent = err.message || 'Invalid credentials';
                errorEl.style.display = 'block';
                btn.disabled = false;
                btn.textContent = 'Sign In';
            }
        });
    </script>
</body>
</html>
