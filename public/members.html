<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Members — Patel Society Portal</title>
    <meta name="description" content="Manage Patel Society members and accounts">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div id="navbar"></div>

    <main class="main-content">
        <div class="page-header">
            <div>
                <h1 class="page-title">Members</h1>
                <p class="page-subtitle">Manage accounts and member information</p>
            </div>
            <div class="admin-only">
                <button class="btn btn-primary" onclick="openAddAccountModal()">+ New Account</button>
            </div>
        </div>

        <!-- Members Table -->
        <div class="table-container" id="membersTable">
            <div class="table-header">
                <h3 class="table-title">All Accounts</h3>
                <div class="table-actions">
                    <input type="text" class="search-input" id="searchInput" placeholder="Search account no..." oninput="filterAccounts()">
                </div>
            </div>

            <div class="page-loading" id="membersLoading">
                <span class="loading-spinner"></span> Loading members...
            </div>

            <!-- Desktop Table -->
            <div class="table-responsive" id="desktopTable" style="display:none;">
                <table>
                    <thead>
                        <tr>
                            <th>Acc No.</th>
                            <th>Name</th>
                            <th>Village</th>
                            <th>Phone</th>
                            <th>Members</th>
                            <th class="admin-only">Actions</th>
                        </tr>
                    </thead>
                    <tbody id="membersBody"></tbody>
                </table>
            </div>

            <!-- Mobile Cards -->
            <div class="member-cards" id="mobileCards"></div>

            <div class="empty-state hidden" id="emptyState">
                <div class="empty-state-icon">👥</div>
                <h3>No Accounts Found</h3>
                <p>Create a new account to get started</p>
                <button class="btn btn-primary admin-only" onclick="openAddAccountModal()">+ New Account</button>
            </div>
        </div>
    </main>

    <!-- Add Account Modal -->
    <div class="modal-overlay" id="addAccountModal">
        <div class="modal">
            <div class="modal-header">
                <h3 class="modal-title" id="accountModalTitle">New Account</h3>
                <button class="modal-close" onclick="closeModal('addAccountModal')">×</button>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label class="form-label">Account Number</label>
                    <input class="form-input" type="text" id="accountNo" placeholder="e.g., ACC001">
                </div>

                <div style="margin-bottom: 0.75rem; display: flex; justify-content: space-between; align-items: center;">
                    <label class="form-label" style="margin-bottom:0">Members (max 6)</label>
                    <button class="btn btn-sm btn-secondary" type="button" id="addMemberBtn" onclick="addMemberField()">+ Add Member</button>
                </div>

                <div id="memberFields"></div>

                <hr style="border-color: var(--border-color); margin: 1.5rem 0;">

                <h4 style="font-size: 0.9rem; color: var(--text-secondary); margin-bottom: 1rem;">Login Credentials</h4>
                <div class="form-row">
                    <div class="form-group">
                        <label class="form-label">Username</label>
                        <input class="form-input" type="text" id="accUsername" placeholder="Login username">
                    </div>
                    <div class="form-group">
                        <label class="form-label">Password</label>
                        <input class="form-input" type="password" id="accPassword" placeholder="Login password">
                    </div>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" onclick="closeModal('addAccountModal')">Cancel</button>
                <button class="btn btn-primary" onclick="saveAccount()">Save Account</button>
            </div>
        </div>
    </div>

    <!-- Edit Member Modal -->
    <div class="modal-overlay" id="editMemberModal">
        <div class="modal">
            <div class="modal-header">
                <h3 class="modal-title">Edit Member</h3>
                <button class="modal-close" onclick="closeModal('editMemberModal')">×</button>
            </div>
            <div class="modal-body">
                <input type="hidden" id="editMemberId">
                <div class="form-group">
                    <label class="form-label">Name</label>
                    <input class="form-input" type="text" id="editName">
                </div>
                <div class="form-group">
                    <label class="form-label">Village</label>
                    <input class="form-input" type="text" id="editVillage">
                </div>
                <div class="form-group">
                    <label class="form-label">Phone</label>
                    <input class="form-input" type="text" id="editPhone">
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" onclick="closeModal('editMemberModal')">Cancel</button>
                <button class="btn btn-primary" onclick="updateMember()">Update</button>
            </div>
        </div>
    </div>

    <!-- Add Single Member Modal -->
    <div class="modal-overlay" id="addSingleMemberModal">
        <div class="modal">
            <div class="modal-header">
                <h3 class="modal-title">Add Member to Account <span id="addToAccNo"></span></h3>
                <button class="modal-close" onclick="closeModal('addSingleMemberModal')">×</button>
            </div>
            <div class="modal-body">
                <input type="hidden" id="addToAccountNo">
                <div class="form-group">
                    <label class="form-label">Name</label>
                    <input class="form-input" type="text" id="newMemberName" placeholder="Full name">
                </div>
                <div class="form-group">
                    <label class="form-label">Village</label>
                    <input class="form-input" type="text" id="newMemberVillage" placeholder="Village name">
                </div>
                <div class="form-group">
                    <label class="form-label">Phone</label>
                    <input class="form-input" type="text" id="newMemberPhone" placeholder="Phone number">
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" onclick="closeModal('addSingleMemberModal')">Cancel</button>
                <button class="btn btn-primary" onclick="addSingleMember()">Add Member</button>
            </div>
        </div>
    </div>

    <script src="js/app.js"></script>
    <script src="js/members.js"></script>
</body>
</html>
